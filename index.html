<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
  <link rel="stylesheet" href="css/cssReset.css">
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/paper.css">
  <link rel="stylesheet" href="css/main.css">
  <title>유가네</title>
</head>
<body>
  <div class="wrap">
    <header>
      <nav class="navigation">
        <div class="nav-bar">
          <ul>
            <li><a href="#">히어로 섹션</a></li>
            <li><a href="#">창업비용 섹션</a></li>
            <li><a href="#">매출 섹션</a></li>
            <li><a href="#">메뉴 셕센</a></li>
            <li><a href="#">브랜드 마케팅</a></li>
            <li><a href="#">창업문의</a></li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <!-- hero-section 추후 구조 수정 필요 -->
      <section class="hero-section">
        <div class="hero-sec" id="hero-sec">
          <div class="header-wrap">
            <header class="header" id="header">
              <div class="header-inner">
                <div class="header-side">
                  <h1>
                    <a href="#">
                      <img src="img/logo.png" alt="유가네 닭갈비 로고">
                    </a>
                  </h1>
                </div>
                <div class="header-side">
                  <p class="header-tel">
                    가맹문의
                    <br class="visible-mobile" style="display: none;">
                    1611.9922
                  </p>
                </div>
              </div>
            </header>
          </div>
          <div class="hero-sec-btn-list-wrap">
            <ul class="hero-sec-btn-list">
              <li><button class="hero-sec-btn" id="hero-sec-btn">1981</button></li>
              <li><button class="hero-sec-btn" id="hero-sec-btn">1990</button></li>
              <li><button class="hero-sec-btn" id="hero-sec-btn">2000</button></li>
              <li><button class="hero-sec-btn" id="hero-sec-btn">2010</button></li>
              <li><button class="hero-sec-btn" id="hero-sec-btn">2026</button></li>
            </ul>
          </div>
        </div>
      </section>
      <section class="revenue-sec">
        <div class="revenue-sec-wrap">
          <div class="revenue-sec-left">
            <div class="revenue-sec-left-desc-box">
              <div class="revenue-sec-left-title">
                <span class="desc-60">유가네로</span>
                <br>
                <span class="desc-70">
                  <em class="primary">업종변경</em>
                   하는데
                  <br>
                  <em class="secondary">얼마나 들어요?</em>
                </span>
              </div>
              <p class="revenue-sec-left-desc">
                하단 채팅 문의 아이콘을
                <em>클릭해 보세요!</em>
              </p>
            </div>
            <div class="revenue-sec-left-chat-box">
              <p class="revenue-sec-left-chat-box-title">궁금한 건 채팅으로 문의하세요</p>
              <p class="revenue-sec-left-chat-box-answer">몇 분 내 답변을 받으실 수 있어요</p>
              <div class="revenue-sec-chat-box-circle">
                <div class="revenue-sec-chat-box-icon">
                  <img src="img/change-chat-icon.webp" alt="">
                </div>
                <p class="revenue-sec-chat-box-desc">채팅문의</p>
              </div>
            </div>
            <div class="revenue-sec-left-food-img">
              <img src="img/change-food-figure.webp" alt="">
            </div>
          </div>
          <div class="revenue-sec-right">
            <div class="revenue-sec-right-desc-box">
              <p class="revenue-sec-right-desc-box-label">A~Z까지 총비용</p>
              <p class="revenue-sec-right-desc-box-value">2,000만원~</p>
            </div>
            <div class="swiper">
              <ul class="swiper-wrap">
                <li>
                  <img src="img/change-slide01.webp" alt="">
                  <div class="slide-text-box">
                    <img src="img/change-slide-text-box01.webp" alt="">
                  </div>
                </li>
                <li>list02<img src="" alt=""></li>
                <li>list03<img src="" alt=""></li>
              </ul>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
